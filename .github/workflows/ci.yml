name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.19", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build upstream sysml-2ls
        run: pnpm run build:upstream

      - name: Run checks
        run: pnpm run ci

      - name: Upload JS service coverage to Codecov
        if: matrix.node-version == '24'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info,coverage/cobertura-coverage.xml
          flags: js-service
          name: js-service-node24
          fail_ci_if_error: true

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "20.19"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Build upstream sysml-2ls
        run: pnpm run build:upstream

      - name: Install documentation dependencies
        run: |
          python -m pip install -r docs/requirements.txt
          python -m pip install --no-build-isolation -e clients/python

      - name: Run documentation checks
        run: pnpm run docs:check:full

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Compute version metadata
        id: version
        run: |
          node scripts/check-version.mjs
          echo "service_version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
          echo "service_revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "upstream_version=$(node -p "require('./upstream/sysml-2ls/packages/syside-languageserver/package.json').version")" >> "$GITHUB_OUTPUT"
          echo "upstream_revision=$(git -C upstream/sysml-2ls rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "source_repository=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t sysmlv2-ls-service:ci \
            --build-arg SERVICE_VERSION="${{ steps.version.outputs.service_version }}" \
            --build-arg SERVICE_REVISION="${{ steps.version.outputs.service_revision }}" \
            --build-arg SOURCE_REPOSITORY="${{ steps.version.outputs.source_repository }}" \
            --build-arg UPSTREAM_SYSML_2LS_VERSION="${{ steps.version.outputs.upstream_version }}" \
            --build-arg UPSTREAM_SYSML_2LS_REVISION="${{ steps.version.outputs.upstream_revision }}" \
            --build-arg UPSTREAM_SYSML_2LS_REPOSITORY=https://github.com/sensmetry/sysml-2ls \
            --build-arg BUILD_DATE="${{ steps.version.outputs.build_date }}" \
            .

      - name: Smoke test Docker image
        run: |
          set -euo pipefail
          docker run -d --rm --name sysmlv2-ls-service-ci -p 3000:3000 sysmlv2-ls-service:ci
          cleanup() {
            docker stop sysmlv2-ls-service-ci >/dev/null 2>&1 || true
            docker stop sysmlv2-ls-service-ci-disabled >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if curl --noproxy '*' -fsS http://127.0.0.1:3000/healthz; then
              break
            fi
            if [ "$i" = 30 ]; then
              docker logs sysmlv2-ls-service-ci
              exit 1
            fi
            sleep 1
          done
          curl --noproxy '*' -fsS -X POST http://127.0.0.1:3000/v1/validate \
            -H 'content-type: application/json' \
            --data '{"files":[{"uri":"memory:///demo.sysml","text":"package Demo { part def Vehicle; }"}]}' \
            | tee /tmp/validate.json
          grep -q '"ok":true' /tmp/validate.json
          curl --noproxy '*' -fsS http://127.0.0.1:3000/v1/version \
            | tee /tmp/version.json
          node -e '
            const fs = require("node:fs");
            const version = JSON.parse(fs.readFileSync("/tmp/version.json", "utf8"));
            if (version.service.version !== "${{ steps.version.outputs.service_version }}") process.exit(1);
            if (version.service.revision !== "${{ steps.version.outputs.service_revision }}") process.exit(1);
            if (version.upstream.sysml2ls.version !== "${{ steps.version.outputs.upstream_version }}") process.exit(1);
            if (version.upstream.sysml2ls.revision !== "${{ steps.version.outputs.upstream_revision }}") process.exit(1);
            if (version.upstream.sysml2ls.repository !== "https://github.com/sensmetry/sysml-2ls") process.exit(1);
            if (!version.build.nodeVersion.startsWith("v24.")) process.exit(1);
          '
          curl --noproxy '*' -fsS -X POST http://127.0.0.1:3000/v1/validate \
            -H 'content-type: application/json' \
            --data '{"files":[{"uri":"memory:///bad.sysml","text":"package Demo { part def }"}],"validationChecks":"none"}' \
            | tee /tmp/invalid.json
          grep -q '"ok":false' /tmp/invalid.json

          docker run -d --rm --name sysmlv2-ls-service-ci-disabled -p 3001:3000 \
            -e VALIDATE_MAX_FILES=0 \
            -e VALIDATE_MAX_FILE_TEXT_BYTES=0 \
            -e VALIDATE_MAX_TOTAL_TEXT_BYTES=0 \
            -e HTTP_BODY_LIMIT_BYTES=0 \
            -e VALIDATION_TIMEOUT_MS=0 \
            sysmlv2-ls-service:ci
          for i in $(seq 1 30); do
            if curl --noproxy '*' -fsS http://127.0.0.1:3001/healthz; then
              break
            fi
            if [ "$i" = 30 ]; then
              docker logs sysmlv2-ls-service-ci-disabled
              exit 1
            fi
            sleep 1
          done
          curl --noproxy '*' -fsS http://127.0.0.1:3001/v1/capabilities \
            | tee /tmp/capabilities-disabled.json
          node -e '
            const fs = require("node:fs");
            const limits = JSON.parse(fs.readFileSync("/tmp/capabilities-disabled.json", "utf8")).limits;
            const values = [
              limits.validate.maxFiles,
              limits.validate.maxFileTextBytes,
              limits.validate.maxTotalTextBytes,
              limits.validate.validationTimeoutMs,
              limits.http.bodyLimitBytes
            ];
            if (!values.every((value) => value === null)) {
              console.error("Expected disabled Docker limits to be null:", values);
              process.exit(1);
            }
          '

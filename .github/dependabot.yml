version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      test-tooling:
        patterns:
          - "vitest"
          - "vite"
          - "esbuild"
          - "tsx"
      lint-tooling:
        patterns:
          - "eslint"
          - "typescript-eslint"
    ignore:
      # TypeScript upgrades are handled as deliberate migrations because the
      # current pinned upstream/tooling stack is validated on TypeScript 5.1.x.
      - dependency-name: "typescript"
      # Keep Node typings aligned with the package's Node 20.19+ API floor.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Keep the published image on the current Node LTS major. Adopt the next
      # LTS major deliberately after compatibility and upstream smoke testing.
      - dependency-name: "node"
        update-types:
          - "version-update:semver-major"
